name: Image Promotion (Trusted Source)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      n8n_version:
        description: 'n8n version to pull'
        default: 'latest'
        required: false

env:
  N8N_VERSION: ${{ github.event.inputs.n8n_version || 'latest' }}

jobs:
  scan-images:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release jq
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Identify Vulnerabilities (Non-blocking)
        run: |
          trivy image --format json --output trivy-report.json --severity CRITICAL,HIGH --ignore-unfixed n8nio/n8n:${{ env.N8N_VERSION }}
          # Generate a readable text summary
          echo "### Vulnerability Summary for n8nio/n8n:${{ env.N8N_VERSION }}" > trivy-summary.txt
          jq -r 'if .Results then .Results[] | select(.Vulnerabilities != null) | .Vulnerabilities[] | "- \(.VulnerabilityID) (\(.Severity)): \(.PkgName) \(.InstalledVersion) -> \(.FixedVersion // "None")" else "No vulnerabilities found." end' trivy-report.json >> trivy-summary.txt

      - name: Upload Vulnerability Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-vulnerability-report-${{ env.N8N_VERSION }}
          path: |
            trivy-report.json
            trivy-summary.txt

      - name: Fail pipeline if vulnerable
        run: |
          # Fails the pipeline to prevent unapproved continuation if there are HIGH or CRITICAL findings.
          # The user must review the artifact and manually approve the next job.
          trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed n8nio/n8n:${{ env.N8N_VERSION }} || exit 0 # We exit 0 here so the workflow doesn't completely crash and skip the next job block. The actual gating happens in the Environment.

  promote-images:
    name: Manual Approval & Promotion
    needs: scan-images
    runs-on: ubuntu-latest
    environment: trusted-promotion
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pulll and tag n8n
        run: |
          docker pull n8nio/n8n:${{ env.N8N_VERSION }}
          IMAGE_NAME="n8nio/n8n:${{ env.N8N_VERSION }}"
          TRUSTED_IMAGE="ghcr.io/${{ github.repository }}/n8n-trusted:${{ env.N8N_VERSION }}"
          docker tag $IMAGE_NAME $TRUSTED_IMAGE
          docker push $TRUSTED_IMAGE
