name: Image Promotion (Trusted Source)

on:
  workflow_dispatch:
    inputs:
      n8n_version:
        description: 'n8n version to pull'
        default: 'latest'
        required: true

jobs:
  promote-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.4.0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull n8n
        run: |
          IMAGE_NAME="n8nio/n8n:${{ github.event.inputs.n8n_version }}"
          docker pull $IMAGE_NAME

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'n8nio/n8n:${{ github.event.inputs.n8n_version }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Promote n8n to Trusted Source
        run: |
          IMAGE_NAME="n8nio/n8n:${{ github.event.inputs.n8n_version }}"
          TRUSTED_IMAGE="ghcr.io/${{ github.repository }}/n8n-trusted:${{ github.event.inputs.n8n_version }}"
          
          echo "Promoting to trusted source..."
          docker tag $IMAGE_NAME $TRUSTED_IMAGE
          docker push $TRUSTED_IMAGE
