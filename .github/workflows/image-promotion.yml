name: Image Promotion (Trusted Source)

on:
  workflow_dispatch:
    inputs:
      n8n_version:
        description: 'n8n version to pull (e.g. 1.55.3) — enter "latest" to auto-resolve'
        required: false
        default: 'latest'

env:
  N8N_VERSION: ${{ github.event.inputs.n8n_version || 'latest' }}

jobs:
  scan-images:
    name: Security Scan
    runs-on: ubuntu-latest
    outputs:
      is_vulnerable: ${{ steps.trivy-scan.outputs.is_vulnerable }}
      image_digest: ${{ steps.fetch-digest.outputs.digest }}
      resolved_version: ${{ steps.fetch-digest.outputs.version }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy and cosign
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release jq
          # Install Trivy
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy
          # Install cosign for upstream publisher identity checks
          curl -sLO https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
          sudo install -m 755 cosign-linux-amd64 /usr/local/bin/cosign

      - name: Enforce Source Allowlist (Policy-as-Code)
        run: |
          ALLOWED_IMAGE=$(grep 'source_image:' policy/image-ingestion-policy.yml | awk '{print $2}' | tr -d '"')
          TAG_PATTERN=$(grep 'tag_pattern:' policy/image-ingestion-policy.yml | awk '{print $2}' | tr -d '"')
          REQUESTED_VERSION="${{ env.N8N_VERSION }}"

          echo "Policy: allowed source = $ALLOWED_IMAGE"

          # Enforce source repo allowlist
          if [ "$ALLOWED_IMAGE" != "n8nio/n8n" ]; then
            echo "❌ POLICY VIOLATION: Source image '$ALLOWED_IMAGE' is not the allowlisted source."
            exit 1
          fi
          echo "✅ Source allowlist passed: n8nio/n8n"

          # Enforce tag pattern (skip if 'latest' — will be resolved to semver in next step)
          if [ "$REQUESTED_VERSION" != "latest" ]; then
            if ! echo "$REQUESTED_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "❌ POLICY VIOLATION: Tag '$REQUESTED_VERSION' does not match semver pattern. Moving targets (stable, nightly, etc.) are not permitted."
              exit 1
            fi
            echo "✅ Tag pattern passed: $REQUESTED_VERSION matches x.y.z"
          fi

      - name: Check Upstream Vendor Signature (Cosign)
        run: |
          echo "" >> trivy-summary-meta.txt || true
          echo "### Upstream Vendor Signature Check" > vendor-sig-check.txt
          echo "Checking if n8nio/n8n publishes Sigstore/cosign signatures..." >> vendor-sig-check.txt

          # Attempt cosign verification of the upstream Docker Hub image
          if cosign verify n8nio/n8n:${{ env.N8N_VERSION }} \
              --certificate-identity-regexp=".*" \
              --certificate-oidc-issuer-regexp=".*" 2>/dev/null; then
            echo "✅ Vendor signature VERIFIED — n8n publishes Sigstore signatures." >> vendor-sig-check.txt
          else
            echo "⚠️  VENDOR RISK GAP: n8nio/n8n does not publish Sigstore/cosign signatures." >> vendor-sig-check.txt
            echo "   Publisher identity cannot be cryptographically verified upstream." >> vendor-sig-check.txt
            echo "   Mitigations in place (per policy/image-ingestion-policy.yml):" >> vendor-sig-check.txt
            echo "   - Source allowlisted to n8nio/n8n only" >> vendor-sig-check.txt
            echo "   - Strict semver tag enforcement (no moving targets)" >> vendor-sig-check.txt
            echo "   - Immutable SHA256 digest pinning throughout pipeline" >> vendor-sig-check.txt
            echo "   Accepted risk: see policy/image-ingestion-policy.yml vendor_signature.accepted_risk" >> vendor-sig-check.txt
          fi
          cat vendor-sig-check.txt

      - name: Fetch and pin image by digest
        id: fetch-digest
        run: |
          # If 'latest' was entered, resolve the actual semantic version from Docker Hub
          REQUESTED="${{ env.N8N_VERSION }}"
          if [ "$REQUESTED" = "latest" ]; then
            TOKEN=$(curl -s "https://auth.docker.io/token?service=registry.docker.io&scope=repository:n8nio/n8n:pull" | jq -r '.token')
            RESOLVED=$(curl -s -H "Authorization: Bearer $TOKEN" \
              "https://registry-1.docker.io/v2/n8nio/n8n/tags/list" | jq -r '.tags[]' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
            echo "Resolved latest -> $RESOLVED"
            echo "N8N_VERSION=$RESOLVED" >> $GITHUB_ENV
            VERSION=$RESOLVED
          else
            VERSION="$REQUESTED"
          fi

          # Resolve the exact SHA256 digest for this version tag from Docker Hub
          TOKEN=$(curl -s "https://auth.docker.io/token?service=registry.docker.io&scope=repository:n8nio/n8n:pull" | jq -r '.token')
          DIGEST=$(curl -s -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://registry-1.docker.io/v2/n8nio/n8n/manifests/$VERSION" \
            --head | grep -i docker-content-digest | awk '{print $2}' | tr -d '\r')
          if [ -z "$DIGEST" ]; then
            echo "ERROR: Could not resolve digest for n8nio/n8n:$VERSION. Is the version valid?"
            exit 1
          fi
          echo "Pinned version: $VERSION @ $DIGEST"
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Pull by immutable digest — guarantees what we scan is what we promote
          docker pull n8nio/n8n@$DIGEST
          docker tag n8nio/n8n@$DIGEST n8nio/n8n:$VERSION

      - name: Scan for CVEs (non-blocking report)
        run: |
          # Scan ALL severities so KEV can cross-reference Medium/Low CVEs too
          trivy image \
            --format json \
            --output trivy-report.json \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --ignore-unfixed \
            n8nio/n8n:${{ env.N8N_VERSION }}

          # Human-readable summary
          echo "### Vulnerability Scan — n8nio/n8n:${{ env.N8N_VERSION }}" > trivy-summary.txt
          echo "Pinned digest: ${{ steps.fetch-digest.outputs.digest }}" >> trivy-summary.txt
          echo "" >> trivy-summary.txt
          echo "#### CRITICAL & HIGH CVEs" >> trivy-summary.txt
          jq -r 'if .Results then
            .Results[] | select(.Vulnerabilities != null) | .Vulnerabilities[] | select(.Severity=="CRITICAL" or .Severity=="HIGH") |
            "- \(.VulnerabilityID) (\(.Severity)): \(.PkgName) \(.InstalledVersion) -> \(.FixedVersion // "None")"
          else "None." end' trivy-report.json >> trivy-summary.txt
          echo "" >> trivy-summary.txt
          echo "#### MEDIUM & LOW CVEs" >> trivy-summary.txt
          jq -r 'if .Results then
            .Results[] | select(.Vulnerabilities != null) | .Vulnerabilities[] | select(.Severity=="MEDIUM" or .Severity=="LOW") |
            "- \(.VulnerabilityID) (\(.Severity)): \(.PkgName) \(.InstalledVersion) -> \(.FixedVersion // "None")"
          else "None." end' trivy-report.json >> trivy-summary.txt

      - name: Check CISA KEV (Known Exploited Vulnerabilities)
        id: kev-check
        run: |
          curl -s -o kev.json https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json

          echo "" >> trivy-summary.txt
          echo "---" >> trivy-summary.txt
          echo "### CISA KEV Check — Actively Exploited CVEs" >> trivy-summary.txt

          # Cross-reference ALL CVE IDs (any severity) against KEV
          VULNS=$(jq -r '[.Results[]?.Vulnerabilities[]?.VulnerabilityID] | unique | .[]' trivy-report.json 2>/dev/null || echo "")
          KEV_IDS=$(jq -r '.vulnerabilities[].cveID' kev.json)
          KEV_HIT=false

          for CVE in $VULNS; do
            if echo "$KEV_IDS" | grep -q "$CVE"; then
              SEVERITY=$(jq -r ".Results[]?.Vulnerabilities[]? | select(.VulnerabilityID==\"$CVE\") | .Severity" trivy-report.json | head -1)
              ENTRY=$(jq -r ".vulnerabilities[] | select(.cveID==\"$CVE\") | \"- $CVE ($SEVERITY — KEV) | \(.vendorProject) \(.product): \(.shortDescription)\"" kev.json)
              echo "$ENTRY" >> trivy-summary.txt
              KEV_HIT=true
            fi
          done

          if [ "$KEV_HIT" = false ]; then
            echo "✅ No CVEs match the CISA KEV catalogue." >> trivy-summary.txt
          fi

          echo "kev_hit=$KEV_HIT" >> $GITHUB_OUTPUT
          cat trivy-summary.txt

      - name: Generate Enhanced Job Summary
        if: always()
        run: |
          if [ ! -f trivy-report.json ]; then
            echo "## 🛡️ Security Scan Summary" >> $GITHUB_STEP_SUMMARY
            echo "❌ No scan report found." >> $GITHUB_STEP_SUMMARY
          else
            python3 .github/scripts/generate_summary.py trivy-report.json kev.json "${{ env.N8N_VERSION }}"
          fi
          if [ -f vendor-sig-check.txt ]; then
            cat vendor-sig-check.txt >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: scan-report-${{ env.N8N_VERSION }}
          path: |
            trivy-report.json
            trivy-summary.txt
            vendor-sig-check.txt
            kev.json

      - name: Gate — Require approval if CRITICAL/HIGH or KEV hit
        id: trivy-scan
        run: |
          # Check 1: any CRITICAL or HIGH CVEs?
          HAS_CRIT_HIGH=false
          if ! trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed n8nio/n8n:${{ env.N8N_VERSION }}; then
            HAS_CRIT_HIGH=true
          fi

          # Check 2: any CVE (any severity) matched the KEV catalogue?
          KEV_HIT="${{ steps.kev-check.outputs.kev_hit }}"

          if [ "$HAS_CRIT_HIGH" = true ] || [ "$KEV_HIT" = true ]; then
            echo "⚠️ Approval required: HAS_CRIT_HIGH=$HAS_CRIT_HIGH  KEV_HIT=$KEV_HIT"
            echo "is_vulnerable=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Clean: no CRITICAL/HIGH CVEs and no KEV matches. Auto-promotion enabled."
            echo "is_vulnerable=false" >> $GITHUB_OUTPUT
          fi
          exit 0

  promote-images-auto:
    name: Auto Promotion (Clean Image)
    needs: scan-images
    if: needs.scan-images.outputs.is_vulnerable == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull by digest and push to GHCR
        id: docker_push
        run: |
          # Pull the exact pinned digest resolved during the scan step
          DIGEST="${{ needs.scan-images.outputs.image_digest }}"
          docker pull n8nio/n8n@$DIGEST
          TRUSTED_IMAGE="ghcr.io/${{ github.repository }}/n8n-trusted:${{ env.N8N_VERSION }}"
          docker tag n8nio/n8n@$DIGEST $TRUSTED_IMAGE
          PUSH_OUTPUT=$(docker push $TRUSTED_IMAGE)
          GHCR_DIGEST=$(echo "$PUSH_OUTPUT" | grep -oP 'sha256:[a-f0-9]+')
          echo "GHCR digest: $GHCR_DIGEST"
          echo "digest=$GHCR_DIGEST" >> $GITHUB_OUTPUT

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}/n8n-trusted
          subject-digest: ${{ steps.docker_push.outputs.digest }}
          push-to-registry: true
          show-summary: true
          summary-title: "SLSA Build Provenance Attested"

      - name: Generate SBOM from local image
        uses: anchore/sbom-action@v0
        with:
          image: n8nio/n8n:${{ env.N8N_VERSION }}
          artifact-name: sbom-${{ env.N8N_VERSION }}.spdx.json
          output-file: ./sbom.spdx.json

      - name: Attest SBOM
        uses: actions/attest-sbom@v1
        with:
          subject-name: ghcr.io/${{ github.repository }}/n8n-trusted
          subject-digest: ${{ steps.docker_push.outputs.digest }}
          sbom-path: './sbom.spdx.json'
          push-to-registry: true
          show-summary: true
          summary-title: "SBOM Attestation Created"

      - name: Create GitHub Release with rollback info
        uses: softprops/action-gh-release@v2
        with:
          files: ./sbom.spdx.json
          tag_name: n8n-${{ needs.scan-images.outputs.resolved_version }}
          name: "n8n ${{ needs.scan-images.outputs.resolved_version }} (Trusted)"
          body: |
            ## Trusted n8n Release — ${{ needs.scan-images.outputs.resolved_version }}

            ### Image Reference (Digest-Pinned)
            Pull by **immutable digest** for guaranteed integrity:
            ```
            docker pull ghcr.io/${{ github.repository }}/n8n-trusted@${{ steps.docker_push.outputs.digest }}
            ```

            Or by version tag:
            ```
            docker pull ghcr.io/${{ github.repository }}/n8n-trusted:${{ needs.scan-images.outputs.resolved_version }}
            ```

            ### Source
            - Upstream: `n8nio/n8n@${{ needs.scan-images.outputs.image_digest }}`
            - GHCR digest: `${{ steps.docker_push.outputs.digest }}`
            - Trivy Scan: ✅ No CRITICAL/HIGH CVEs found, no CISA KEV matches
            - Full report: [`scan-report-${{ needs.scan-images.outputs.resolved_version }}`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ### Rollback
            Set these values in your `.env` file and run `docker compose up -d`:
            ```
            N8N_IMAGE_VERSION=${{ needs.scan-images.outputs.resolved_version }}
            N8N_IMAGE_DIGEST=${{ steps.docker_push.outputs.digest }}
            ```

  promote-images-manual:
    name: Manual Approval Promotion (Vulnerable Image)
    needs: scan-images
    if: needs.scan-images.outputs.is_vulnerable == 'true'
    runs-on: ubuntu-latest
    environment: trusted-promotion
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull by digest and push to GHCR
        id: docker_push
        run: |
          DIGEST="${{ needs.scan-images.outputs.image_digest }}"
          docker pull n8nio/n8n@$DIGEST
          TRUSTED_IMAGE="ghcr.io/${{ github.repository }}/n8n-trusted:${{ env.N8N_VERSION }}"
          docker tag n8nio/n8n@$DIGEST $TRUSTED_IMAGE
          PUSH_OUTPUT=$(docker push $TRUSTED_IMAGE)
          GHCR_DIGEST=$(echo "$PUSH_OUTPUT" | grep -oP 'sha256:[a-f0-9]+')
          echo "GHCR digest: $GHCR_DIGEST"
          echo "digest=$GHCR_DIGEST" >> $GITHUB_OUTPUT

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}/n8n-trusted
          subject-digest: ${{ steps.docker_push.outputs.digest }}
          push-to-registry: true
          show-summary: true
          summary-title: "SLSA Build Provenance Attested"

      - name: Generate SBOM from local image
        uses: anchore/sbom-action@v0
        with:
          image: n8nio/n8n:${{ env.N8N_VERSION }}
          artifact-name: sbom-${{ env.N8N_VERSION }}.spdx.json
          output-file: ./sbom.spdx.json

      - name: Attest SBOM
        uses: actions/attest-sbom@v1
        with:
          subject-name: ghcr.io/${{ github.repository }}/n8n-trusted
          subject-digest: ${{ steps.docker_push.outputs.digest }}
          sbom-path: './sbom.spdx.json'
          push-to-registry: true
          show-summary: true
          summary-title: "SBOM Attestation Created"

      - name: Create GitHub Release with rollback info
        uses: softprops/action-gh-release@v2
        with:
          files: ./sbom.spdx.json
          tag_name: n8n-${{ needs.scan-images.outputs.resolved_version }}
          name: "n8n ${{ needs.scan-images.outputs.resolved_version }} (Manually Approved — Vulnerabilities Present)"
          body: |
            ## ⚠️ n8n ${{ needs.scan-images.outputs.resolved_version }} — Manually Approved

            This version was promoted **with known CRITICAL/HIGH CVEs or CISA KEV matches** after manual review.
            Full scan report: [`scan-report-${{ needs.scan-images.outputs.resolved_version }}`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ### Image Reference (Digest-Pinned)
            ```
            docker pull ghcr.io/${{ github.repository }}/n8n-trusted@${{ steps.docker_push.outputs.digest }}
            ```

            Or by version tag:
            ```
            docker pull ghcr.io/${{ github.repository }}/n8n-trusted:${{ needs.scan-images.outputs.resolved_version }}
            ```

            ### Source
            - Upstream: `n8nio/n8n@${{ needs.scan-images.outputs.image_digest }}`
            - GHCR digest: `${{ steps.docker_push.outputs.digest }}`

            ### Rollback
            Set these values in your `.env` file and run `docker compose up -d`:
            ```
            N8N_IMAGE_VERSION=${{ needs.scan-images.outputs.resolved_version }}
            N8N_IMAGE_DIGEST=${{ steps.docker_push.outputs.digest }}
            ```
