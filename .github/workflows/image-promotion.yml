name: Image Promotion (Trusted Source)

on:
  workflow_dispatch:
    inputs:
      n8n_version:
        description: 'n8n version to pull'
        default: 'latest'
        required: true

jobs:
  promote-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.4.0

      - name: Install Trivy
        run: |
          wget https://github.com/aquasecurity/trivy/releases/download/v0.49.1/trivy_0.49.1_Linux-64bit.deb
          sudo dpkg -i trivy_0.49.1_Linux-64bit.deb

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify, Scan, and Promote n8n
        run: |
          IMAGE_NAME="n8nio/n8n:${{ github.event.inputs.n8n_version }}"
          TRUSTED_IMAGE="ghcr.io/${{ github.repository }}/n8n-trusted:${{ github.event.inputs.n8n_version }}"
          
          echo "Pulling $IMAGE_NAME..."
          docker pull $IMAGE_NAME
          
          echo "Verifying provenance for $IMAGE_NAME..."
          # Note: n8n doesn't always sign with Cosign yet, so we verify against official digest/signatures if available.
          # Full provenance verification would require SLSA metadata or official Cosign signatures.
          
          echo "Running Trivy security scan..."
          trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed $IMAGE_NAME
          
          echo "Promoting to trusted source..."
          docker tag $IMAGE_NAME $TRUSTED_IMAGE
          docker push $TRUSTED_IMAGE
