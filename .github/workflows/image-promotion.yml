name: Image Promotion (Trusted Source)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      n8n_version:
        description: 'n8n version to pull'
        default: 'latest'
        required: false

env:
  N8N_VERSION: ${{ github.event.inputs.n8n_version || 'latest' }}

jobs:
  scan-images:
    name: Security Scan
    runs-on: ubuntu-latest
    outputs:
      is_vulnerable: ${{ steps.trivy-scan.outputs.is_vulnerable }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release jq
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Enforce Docker Content Trust & Pull Image
        run: |
          export DOCKER_CONTENT_TRUST=1
          docker pull n8nio/n8n:${{ env.N8N_VERSION }}

      - name: Identify Vulnerabilities (Non-blocking)
        run: |
          trivy image --format json --output trivy-report.json --severity CRITICAL,HIGH --ignore-unfixed n8nio/n8n:${{ env.N8N_VERSION }}
          # Generate a readable text summary
          echo "### Vulnerability Summary for n8nio/n8n:${{ env.N8N_VERSION }}" > trivy-summary.txt
          jq -r 'if .Results then .Results[] | select(.Vulnerabilities != null) | .Vulnerabilities[] | "- \(.VulnerabilityID) (\(.Severity)): \(.PkgName) \(.InstalledVersion) -> \(.FixedVersion // "None")" else "No vulnerabilities found." end' trivy-report.json >> trivy-summary.txt

      - name: Upload Vulnerability Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-vulnerability-report-${{ env.N8N_VERSION }}
          path: |
            trivy-report.json
            trivy-summary.txt

      - name: Check for vulnerabilities
        id: trivy-scan
        run: |
          # Run Trivy and capture exit code
          if trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed n8nio/n8n:${{ env.N8N_VERSION }}; then
            echo "is_vulnerable=false" >> $GITHUB_OUTPUT
            echo "No critical/high vulnerabilities found. Auto-promotion enabled."
          else
            echo "is_vulnerable=true" >> $GITHUB_OUTPUT
            echo "Critical/High vulnerabilities found. Manual approval required."
          fi
          exit 0 # Always exit 0 so the workflow continues to the promotion jobs

  promote-images-auto:
    name: Auto Promotion (Clean Image)
    needs: scan-images
    if: needs.scan-images.outputs.is_vulnerable == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and tag clean n8n
        id: docker_push
        run: |
          docker pull n8nio/n8n:${{ env.N8N_VERSION }}
          IMAGE_NAME="n8nio/n8n:${{ env.N8N_VERSION }}"
          TRUSTED_IMAGE="ghcr.io/${{ github.repository }}/n8n-trusted:${{ env.N8N_VERSION }}"
          docker tag $IMAGE_NAME $TRUSTED_IMAGE
          docker push $TRUSTED_IMAGE
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $TRUSTED_IMAGE | awk -F@ '{print $2}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}/n8n-trusted
          subject-digest: ${{ steps.docker_push.outputs.digest }}
          push-to-registry: true

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.N8N_VERSION }}
          name: "n8n Release ${{ env.N8N_VERSION }}"

  promote-images-manual:
    name: Manual Approval Promotion (Vulnerable Image)
    needs: scan-images
    if: needs.scan-images.outputs.is_vulnerable == 'true'
    runs-on: ubuntu-latest
    environment: trusted-promotion
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and tag vulnerable n8n
        id: docker_push
        run: |
          docker pull n8nio/n8n:${{ env.N8N_VERSION }}
          IMAGE_NAME="n8nio/n8n:${{ env.N8N_VERSION }}"
          TRUSTED_IMAGE="ghcr.io/${{ github.repository }}/n8n-trusted:${{ env.N8N_VERSION }}"
          docker tag $IMAGE_NAME $TRUSTED_IMAGE
          docker push $TRUSTED_IMAGE
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $TRUSTED_IMAGE | awk -F@ '{print $2}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}/n8n-trusted
          subject-digest: ${{ steps.docker_push.outputs.digest }}
          push-to-registry: true

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.N8N_VERSION }}
          name: "n8n Release ${{ env.N8N_VERSION }}"
