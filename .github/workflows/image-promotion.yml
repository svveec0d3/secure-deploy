name: Image Promotion (Trusted Source)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      n8n_version:
        description: 'n8n version to pull'
        default: 'latest'
        required: false

env:
  N8N_VERSION: ${{ github.event.inputs.n8n_version || 'latest' }}

jobs:
  promote-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Export n8n image
        run: |
          docker pull n8nio/n8n:${{ env.N8N_VERSION }}
          docker save n8nio/n8n:${{ env.N8N_VERSION }} -o n8n-image.tar

      - name: Run Trivy vulnerability scanner
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace aquasecurity/trivy:latest image --input /workspace/n8n-image.tar --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed

      - name: Promote n8n to Trusted Source
        run: |
          IMAGE_NAME="n8nio/n8n:${{ env.N8N_VERSION }}"
          TRUSTED_IMAGE="ghcr.io/${{ github.repository }}/n8n-trusted:${{ env.N8N_VERSION }}"
          docker tag $IMAGE_NAME $TRUSTED_IMAGE
          docker push $TRUSTED_IMAGE
