name: Image Promotion (Trusted Source)

on:
  workflow_dispatch:
    inputs:
      n8n_version:
        description: 'n8n version to pull'
        default: 'latest'
        required: true

jobs:
  promote-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.49.1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, Scan and Promote n8n
        run: |
          IMAGE_NAME="n8nio/n8n:${{ github.event.inputs.n8n_version }}"
          TRUSTED_IMAGE="ghcr.io/${{ github.repository }}/n8n-trusted:${{ github.event.inputs.n8n_version }}"
          
          echo "Pulling $IMAGE_NAME..."
          docker pull $IMAGE_NAME
          
          echo "Running Trivy security scan..."
          /usr/local/bin/trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed $IMAGE_NAME
          
          echo "Promoting to trusted source..."
          docker tag $IMAGE_NAME $TRUSTED_IMAGE
          docker push $TRUSTED_IMAGE
