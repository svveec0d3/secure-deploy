name: Continuous Re-Scan (Image Lifecycle)

# Runs weekly to detect new CVEs or KEV entries on previously promoted images.
# If a clean image develops new findings, a GitHub Issue is automatically opened.
on:
  schedule:
    - cron: '0 0 * * 1'   # Every Monday at 00:00 UTC
  workflow_dispatch:        # Allow manual trigger for ad-hoc re-scanning

jobs:
  rescan:
    name: Re-Scan Promoted Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      issues: write         # Needed to open alert issues
      security-events: write
    outputs:
      scanned_versions: ${{ steps.rescan.outputs.scanned_versions }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release jq
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download CISA KEV catalogue
        run: |
          curl -s -o kev.json https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json
          echo "KEV catalogue downloaded: $(jq '.count' kev.json) entries"

      - name: Fetch all promoted releases and re-scan
        id: rescan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALERT_BODY=""
          ALERT_FOUND=false
          mkdir -p sarifs

          # List all GitHub Releases in this repo
          RELEASES=$(gh release list --repo ${{ github.repository }} --limit 20 --json tagName,name | jq -r '.[].tagName')

          for TAG in $RELEASES; do
            # Extract version from tag like 'n8n-1.55.3' -> '1.55.3'
            VERSION=$(echo "$TAG" | sed 's/^n8n-//')

            echo "--- Re-scanning n8n-trusted:$VERSION ---"

            # Try to download the attached SBOM
            if ! gh release download "$TAG" -p "sbom.spdx.json" -O "sbom-$VERSION.json" --repo ${{ github.repository }} > /dev/null 2>&1; then
              echo "  ⚠️  Could not download SBOM for $TAG — falling back to full image scan"
              
              IMAGE="ghcr.io/${{ github.repository }}/n8n-trusted:$VERSION"
              if ! docker pull "$IMAGE" > /dev/null 2>&1; then
                echo "  ⚠️  Could not pull $IMAGE either — skipping"
                continue
              fi
              
              # Run Trivy against the pulled image (JSON for our alerts)
              trivy image \
                --format json \
                --output "rescan-$VERSION.json" \
                --severity CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN \
                "$IMAGE" || true

              # Run Trivy against the pulled image (SARIF for GitHub Security)
              trivy image \
                --format sarif \
                --output "sarifs/rescan-$VERSION.sarif" \
                --severity CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN \
                "$IMAGE" || true
            else
              # Run Trivy against the downloaded SBOM (JSON for our alerts)
              trivy sbom \
                --format json \
                --output "rescan-$VERSION.json" \
                --severity CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN \
                "sbom-$VERSION.json" || true

              # Run Trivy against the downloaded SBOM (SARIF for GitHub Security)
              trivy sbom \
                --format sarif \
                --output "sarifs/rescan-$VERSION.sarif" \
                --severity CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN \
                "sbom-$VERSION.json" || true
            fi

            # Check for CRITICAL/HIGH CVEs
            HAS_CRIT_HIGH=false
            CRIT_HIGH_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")] | length' "rescan-$VERSION.json" 2>/dev/null || echo 0)
            if [ "$CRIT_HIGH_COUNT" -gt 0 ]; then
              HAS_CRIT_HIGH=true
            fi

            # Check for KEV matches
            KEV_IDS=$(jq -r '.vulnerabilities[].cveID' kev.json)
            ALL_VULNS=$(jq -r '[.Results[]?.Vulnerabilities[]?.VulnerabilityID] | unique | .[]' "rescan-$VERSION.json" 2>/dev/null || echo "")
            KEV_HIT=false
            KEV_LIST=""
            for CVE in $ALL_VULNS; do
              if echo "$KEV_IDS" | grep -q "$CVE"; then
                SEVERITY=$(jq -r ".Results[]?.Vulnerabilities[]? | select(.VulnerabilityID==\"$CVE\") | .Severity" "rescan-$VERSION.json" | head -1)
                KEV_LIST="$KEV_LIST\n  - $CVE ($SEVERITY — KEV)"
                KEV_HIT=true
              fi
            done

            # Escalate if either condition triggers
            if [ "$HAS_CRIT_HIGH" = true ] || [ "$KEV_HIT" = true ]; then
              ALERT_FOUND=true
              ALERT_BODY="$ALERT_BODY\n\n### \`n8n-trusted:$VERSION\`\n"
              if [ "$HAS_CRIT_HIGH" = true ]; then
                ALERT_BODY="$ALERT_BODY- 🔴 **$CRIT_HIGH_COUNT unfixed CRITICAL/HIGH CVE(s)** detected\n"
              fi
              if [ "$KEV_HIT" = true ]; then
                ALERT_BODY="$ALERT_BODY- 🚨 **KEV matches** (actively exploited):\n$KEV_LIST\n"
              fi
              echo "  ⚠️  Alert triggered for $VERSION"
            else
              echo "  ✅ $VERSION is still clean"
            fi
          done

          # Track scanned versions for the upload matrix
          SCANNED_VERSIONS_JSON=$(echo "$RELEASES" | sed 's/^n8n-//' | jq -R . | jq -s -c .)
          echo "scanned_versions=$SCANNED_VERSIONS_JSON" >> $GITHUB_OUTPUT

          echo "alert_found=$ALERT_FOUND" >> $GITHUB_OUTPUT
          # Escape multiline for GITHUB_OUTPUT
          echo "alert_body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$ALERT_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Open GitHub Issue if new findings detected
        if: steps.rescan.outputs.alert_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALERT_BODY: ${{ steps.rescan.outputs.alert_body }}
        run: |
          cat << EOF > issue_body.md
          ## Weekly Re-Scan Alert

          One or more previously promoted images now have **new CRITICAL/HIGH CVEs or CISA KEV matches**.

          **Action required**: Review the findings below and decide whether to:
          1. Promote a newer clean version via the Image Promotion pipeline
          2. Revoke the affected image from deployment (update \`N8N_IMAGE_DIGEST\` on hosts)

          $ALERT_BODY

          ---
          *Triggered by the weekly re-scan job on $(date -u '+%Y-%m-%d')*
          EOF

          # Create the 'security' label if it doesn't already exist
          gh label create security --color "FF0000" --force || true

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "🚨 Re-Scan Alert: Previously promoted image(s) have new vulnerability findings" \
            --body-file issue_body.md \
            --label "security"

      - name: Upload SARIFs as internal artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sarif-files
          path: sarifs/

  upload-sarifs:
    name: Upload SARIFs to Code Scanning
    needs: rescan
    if: always()
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.rescan.outputs.scanned_versions) }}
    steps:
      - name: Download SARIF artifact
        uses: actions/download-artifact@v4
        with:
          name: sarif-files
          path: sarifs/

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "sarifs/rescan-${{ matrix.version }}.sarif"
          category: "rescan-${{ matrix.version }}"
