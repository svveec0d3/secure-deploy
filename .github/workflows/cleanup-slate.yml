name: Clean Slate GitHub
on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      security-events: write
    steps:
      - name: Delete all workflow runs (except this one)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deleting workflow runs..."
          gh api --paginate "repos/${{ github.repository }}/actions/runs" -q '.workflow_runs[].id' | while read -r run_id; do
            if [ "$run_id" != "${{ github.run_id }}" ]; then
              echo "Deleting run $run_id"
              gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$run_id" || true
            fi
          done

      - name: Delete all Code Scanning analyses
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deleting SARIF analyses..."
          gh api --paginate "repos/${{ github.repository }}/code-scanning/analyses" -q '.[].id' | while read -r analysis_id; do
            echo "Deleting analysis $analysis_id"
            gh api -X DELETE "repos/${{ github.repository }}/code-scanning/analyses/$analysis_id?confirm_delete=true" || true
          done
          echo "Done!"
